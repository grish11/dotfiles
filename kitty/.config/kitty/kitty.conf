# ── Window ──────────────────────────────────────────────

# open new windows centered
placement_strategy center

# ── Font ────────────────────────────────────────────────

# starting font size
font_size 22

# ── Font Size Keybinds ──────────────────────────────────
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0

# ── Transparency ────────────────────────────────────────

# 0.0 = invisible, 1.0 = solid
background_opacity 0.60

# blur radius behind window
background_blur 60

# lets you adjust opacity live with ctrl+shift+a
dynamic_background_opacity yes

# ── Cursor ──────────────────────────────────────────────

cursor_shape block

# keep block even when window is unfocused
cursor_shape_unfocused block

# prevent shell from overriding cursor shape
shell_integration no-cursor

# ── Scrollback ──────────────────────────────────────────

# default is only 2000
scrollback_lines 10000

# ── URL handling ────────────────────────────────────────

# underline URLs in terminal
url_style curly

# ── Bell ────────────────────────────────────────────────\

# disable that annoying ding
enable_audio_bell no
