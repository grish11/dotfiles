# ── Window ──────────────────────────────────────────────
placement_strategy center        # open new windows centered

# ── Font ────────────────────────────────────────────────
font_size 22                     # starting font size

# ── Font Size Keybinds ──────────────────────────────────
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0

# ── Transparency ────────────────────────────────────────
background_opacity 0.60          # 0.0 = invisible, 1.0 = solid
background_blur 60               # blur radius behind window
dynamic_background_opacity yes   # lets you adjust opacity live with ctrl+shift+a

# ── Cursor ──────────────────────────────────────────────
cursor_shape block
cursor_shape_unfocused block     # keep block even when window is unfocused
shell_integration no-cursor      # prevent shell from overriding cursor shape

# ── Scrollback ──────────────────────────────────────────
scrollback_lines 10000           # default is only 2000

# ── URL handling ────────────────────────────────────────
url_style curly                  # underline URLs in terminal

# ── Bell ────────────────────────────────────────────────
enable_audio_bell no             # disable that annoying ding
